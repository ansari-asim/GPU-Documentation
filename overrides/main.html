{% extends "base.html" %}

{% block content %}
  {% if page.meta.homepage is defined %}
    <div class="md-content" data-md-component="content">
      <article class="md-content__inner md-typeset">
        {% block body %}{% endblock %}
      </article>
    </div>
  {% else %}
    {{ super() }}
  {% endif %}
{% endblock %}
